aid: cosign
name: Cosign
description: >-
  Cosign is a command line tool for signing, verifying, and storing container
  images and other artifacts in OCI registries. It is part of the Sigstore
  project and supports keyless signing using OpenID Connect identity providers
  including Google, GitHub, and Microsoft.
