aid: cosign
name: Cosign
x-type: opensource
description: >-
  Cosign is the command-line client of the Sigstore project for signing,
  verifying, and storing container images, OCI artifacts, blobs, and
  in-toto attestations. Cosign supports keyless signing using OpenID Connect
  identity providers (Google, GitHub, Microsoft) by obtaining short-lived
  certificates from the Fulcio certificate authority and recording signing
  events in the Rekor transparency log. Signatures and attestations are
  stored alongside the signed artifact in any OCI-compliant registry, and
  cosign integrates with policy controllers, KMS providers, hardware tokens,
  and SBOM workflows for software supply chain security.
