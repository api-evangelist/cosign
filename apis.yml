apis:
  - aid: cosign:cosign-cli
    name: Cosign CLI
    description: >-
      Cosign is a command-line tool for signing, verifying, and storing
      container images and OCI artifacts. It supports keyless signing,
      hardware-backed keys, KMS providers, in-toto and SLSA attestations, and
      transparency log inclusion. The CLI is the primary user interface and
      does not expose its own HTTP API.
    humanURL: https://docs.sigstore.dev/cosign/
    properties:
      - type: Documentation
        url: https://docs.sigstore.dev/cosign/
      - type: GettingStarted
        url: https://docs.sigstore.dev/quickstart/quickstart-cosign/
      - type: Installation
        url: https://docs.sigstore.dev/cosign/system_config/installation/
      - type: GitHubRepository
        url: https://github.com/sigstore/cosign
      - type: Reference
        url: https://docs.sigstore.dev/cosign/reference/cosign/
    tags:
      - CLI
      - Containers
      - Keyless
      - OCI
      - Signing
  - aid: cosign:rekor-api
    name: Sigstore Rekor API (consumed)
    description: >-
      Rekor is the Sigstore transparency log that cosign writes to and reads
      from when recording and verifying signing events. The public Rekor
      service exposes a REST API at rekor.sigstore.dev with operations for
      creating log entries, retrieving entries by index or UUID, fetching
      log info and proofs, and searching the index.
    humanURL: https://docs.sigstore.dev/logging/overview/
    baseURL: https://rekor.sigstore.dev
    properties:
      - type: Documentation
        url: https://docs.sigstore.dev/logging/overview/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/sigstore/rekor/main/openapi.yaml
      - type: GitHubRepository
        url: https://github.com/sigstore/rekor
    tags:
      - Rekor
      - REST
      - Sigstore
      - Transparency Log
  - aid: cosign:fulcio-api
    name: Sigstore Fulcio API (consumed)
    description: >-
      Fulcio is the Sigstore certificate authority that issues short-lived
      X.509 code-signing certificates bound to OIDC identities. Cosign calls
      the Fulcio public CA at fulcio.sigstore.dev during keyless signing to
      obtain a certificate for a verified identity.
    humanURL: https://docs.sigstore.dev/certificate_authority/overview/
    baseURL: https://fulcio.sigstore.dev
    properties:
      - type: Documentation
        url: https://docs.sigstore.dev/certificate_authority/overview/
      - type: GitHubRepository
        url: https://github.com/sigstore/fulcio
    tags:
      - CA
      - Certificates
      - Fulcio
      - OIDC
      - Sigstore
